apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
      - name: notification-service
        image: taskforge-notification:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5002
        env:
        - name: REDIS_HOST
          value: redis

---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  selector:
    app: notification-service
  ports:
  - port: 5002
    targetPort: 5002
