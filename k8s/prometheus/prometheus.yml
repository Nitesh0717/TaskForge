global:
  scrape_interval: 15s

scrape_configs:

  - job_name: "prometheus"

    static_configs:
      - targets:
          - localhost:9090

  - job_name: "api-gateway"

    static_configs:
      - targets:
          - api-gateway:8080

  - job_name: "auth-service"

    static_configs:
      - targets:
          - auth-service:5000

  - job_name: "task-service"

    static_configs:
      - targets:
          - task-service:5001

  - job_name: "notification-service"

    static_configs:
      - targets:
          - notification-service:5002
